name: Verify

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Run repository tests
        run: node --test tests/*.test.mjs
      - name: Validate plugin layout
        run: node scripts/install-smoke-check.mjs --repo-root .
